<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- TV monitor body -->
  <rect x="2.5" y="7" width="27" height="17" rx="2.5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Screen -->
  <rect x="5" y="9.5" width="22" height="12" rx="1.5" fill="#060c1a"/>

  <!-- Blue headline bar -->
  <rect x="6.5" y="11" width="18" height="5" rx="1" fill="#3b82f6"/>

  <!-- Content lines -->
  <rect x="6.5" y="18" width="10" height="1.5" rx="0.75" fill="#334155"/>
  <rect x="6.5" y="20.5" width="13" height="1.5" rx="0.75" fill="#334155"/>

  <!-- Green live dot -->
  <circle cx="22.5" cy="13.5" r="2" fill="#22c55e"/>

  <!-- TV stand -->
  <rect x="13" y="24" width="6" height="3" rx="1.5" fill="#334155"/>
  <rect x="10" y="27" width="12" height="1.5" rx="0.75" fill="#334155"/>
</svg>
